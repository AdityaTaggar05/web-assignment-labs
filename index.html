<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IllusTraitor</title>

    <!-- Load Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kode+Mono:wght@400..700&display=swap"
      rel="stylesheet"
    />

    <!-- Load Local CSS Files -->
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/variables.css" />
    <link rel="stylesheet" href="styles/components.css" />
    <link rel="stylesheet" href="components/header/header.css" />
    <link rel="stylesheet" href="components/toolbar/toolbar.css" />
    <link rel="stylesheet" href="components/sidebar/sidebar.css" />
  </head>
  <body>
    <!-- Header -->
    <header>
      <h2>IllusTraitor</h2>
      <div class="actions">
        <button class="btn" id="clear-btn">Clear</button>
        <button class="btn btn-filled" id="save-btn">Save</button>
      </div>
    </header>

    <!-- Main Area -->
    <div class="workspace">
      <!-- Left Toolbar -->
      <div class="toolbar">
        <!-- Select Tool -->
        <button class="tool" data-action="select">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M4 2L4 17L8 13L11 20L13.5 19L10.5 12L16 12Z"
              fill="currentColor"
              stroke="none"
            />
            <path d="M4 2L4 17L8 13L11 20L13.5 19L10.5 12L16 12Z" />
          </svg>
        </button>

        <!-- Eraser Tool -->
        <button class="tool" data-action="eraser">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 7L13 20H6L3 15L11 2Z" />
            <line x1="7.5" y1="17.5" x2="15" y2="4.5" />
            <line x1="6" y1="20" x2="22" y2="20" />
          </svg>
        </button>

        <!-- Pencil Tool -->
        <button class="tool" data-action="pencil">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M16.5 3L21 7.5L8.5 20L3 21L4 15.5Z" />
            <line x1="14.5" y1="5" x2="19" y2="9.5" />
            <line x1="5.5" y1="18.5" x2="7" y2="17" />
          </svg>
        </button>

        <!-- Rectangle Tool -->
        <button class="tool" data-action="rectangle">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="6" width="18" height="12" rx="1" />
            <rect
              x="1.5"
              y="4.5"
              width="3"
              height="3"
              rx="0.5"
              fill="currentColor"
              stroke="none"
            />
            <rect
              x="19.5"
              y="4.5"
              width="3"
              height="3"
              rx="0.5"
              fill="currentColor"
              stroke="none"
            />
            <rect
              x="1.5"
              y="16.5"
              width="3"
              height="3"
              rx="0.5"
              fill="currentColor"
              stroke="none"
            />
            <rect
              x="19.5"
              y="16.5"
              width="3"
              height="3"
              rx="0.5"
              fill="currentColor"
              stroke="none"
            />
          </svg>
        </button>

        <!-- Triangle Tool -->
        <button class="tool" data-action="triangle">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polygon points="12,3 21.5,20.5 2.5,20.5" />
            <rect
              x="10.5"
              y="1.5"
              width="3"
              height="3"
              rx="0.5"
              fill="currentColor"
              stroke="none"
            />
            <rect
              x="20"
              y="19"
              width="3"
              height="3"
              rx="0.5"
              fill="currentColor"
              stroke="none"
            />
            <rect
              x="1"
              y="19"
              width="3"
              height="3"
              rx="0.5"
              fill="currentColor"
              stroke="none"
            />
          </svg>
        </button>

        <!-- Circle Tool -->
        <button class="tool" data-action="circle">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="8.5" />
            <rect
              x="10.5"
              y="2"
              width="3"
              height="3"
              rx="0.5"
              fill="currentColor"
              stroke="none"
            />
            <rect
              x="10.5"
              y="19"
              width="3"
              height="3"
              rx="0.5"
              fill="currentColor"
              stroke="none"
            />
            <rect
              x="1.5"
              y="10.5"
              width="3"
              height="3"
              rx="0.5"
              fill="currentColor"
              stroke="none"
            />
            <rect
              x="19.5"
              y="10.5"
              width="3"
              height="3"
              rx="0.5"
              fill="currentColor"
              stroke="none"
            />
          </svg>
        </button>

        <!-- Ellipse Tool -->
        <button class="tool" data-action="ellipse">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <ellipse cx="12" cy="12" rx="9.5" ry="7" />
            <rect
              x="10.5"
              y="3.5"
              width="3"
              height="3"
              rx="0.5"
              fill="currentColor"
              stroke="none"
            />
            <rect
              x="10.5"
              y="17.5"
              width="3"
              height="3"
              rx="0.5"
              fill="currentColor"
              stroke="none"
            />
            <rect
              x="1"
              y="10.5"
              width="3"
              height="3"
              rx="0.5"
              fill="currentColor"
              stroke="none"
            />
            <rect
              x="20"
              y="10.5"
              width="3"
              height="3"
              rx="0.5"
              fill="currentColor"
              stroke="none"
            />
          </svg>
        </button>

        <!-- Text Tool -->
        <button class="tool" data-action="text">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="3" y1="5" x2="21" y2="5" />
            <line x1="3" y1="3.5" x2="3" y2="6.5" />
            <line x1="21" y1="3.5" x2="21" y2="6.5" />
            <line x1="12" y1="5" x2="12" y2="20" />
            <line x1="9" y1="20" x2="15" y2="20" />
          </svg>
        </button>
        <div class="spacer"></div>

        <!-- Undo -->
        <button class="tool" data-action="undo">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M4 8C5.5 4.5 9 2.5 13 3C17.5 3.5 21 7.5 21 12C21 16.5 17.5 20.5 13 21C8.5 21.5 4.5 18 3.5 14"
            />
            <polyline points="2,5 4,8 7.5,6.5" />
          </svg>
        </button>

        <!-- Redo -->
        <button class="tool" data-action="redo">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M20 8C18.5 4.5 15 2.5 11 3C6.5 3.5 3 7.5 3 12C3 16.5 6.5 20.5 11 21C15.5 21.5 19.5 18 20.5 14"
            />
            <polyline points="22,5 20,8 16.5,6.5" />
          </svg>
        </button>
      </div>

      <!-- Main Canvas -->
      <canvas class="canvas"></canvas>

      <!-- Floating Sidebar -->
      <div class="sidebar">
        <button class="btn btn-filled" id="close">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            height="16"
            width="16"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
          >
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>

        <!-- Dynamic Content -->
        <div class="content"></div>

        <!-- Theme Toggle -->
        <div class="theme-toggle">
          <span class="theme-mode active">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"
                fill="currentColor"
                stroke="currentColor"
                stroke-width="1.2"
              />
            </svg>
          </span>
          <span class="theme-mode">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="4.5" />
              <line x1="12" y1="2" x2="12" y2="4.5" />
              <line x1="12" y1="19.5" x2="12" y2="22" />
              <line x1="2" y1="12" x2="4.5" y2="12" />
              <line x1="19.5" y1="12" x2="22" y2="12" />
              <line x1="5.1" y1="5.1" x2="6.9" y2="6.9" />
              <line x1="17.1" y1="17.1" x2="18.9" y2="18.9" />
              <line x1="18.9" y1="5.1" x2="17.1" y2="6.9" />
              <line x1="6.9" y1="17.1" x2="5.1" y2="18.9" />
            </svg>
          </span>
        </div>
      </div>
    </div>

    <script src="components/sidebar/sidebar.js"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
