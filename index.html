<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IllusTraitor</title>

    <!-- Load Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kode+Mono:wght@400..700&display=swap"
      rel="stylesheet"
    />

    <!-- Load Font Awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />

    <!-- Load Local CSS Files -->
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/variables.css" />
    <link rel="stylesheet" href="styles/components.css" />
    <link rel="stylesheet" href="components/header/header.css" />
    <link rel="stylesheet" href="components/toolbar/toolbar.css" />
    <link rel="stylesheet" href="components/sidebar/sidebar.css" />
  </head>
  <body>
    <!-- Header -->
    <header>
      <h2>IllusTraitor</h2>
      <div class="actions">
        <button class="btn">
          <i class="fa-solid fa-clock-rotate-left"></i>
        </button>
        <button class="btn">Clear</button>
        <button class="btn btn-filled">Save</button>
      </div>
    </header>

    <!-- Main Area -->
    <div class="workspace">
      <!-- Left Toolbar -->
      <div class="toolbar">
        <button class="tool active" data-action="brush">
          <i class="fa-solid fa-brush"></i>
        </button>
        <button class="tool" data-action="square">
          <i class="fa-regular fa-square"></i>
        </button>
        <button class="tool" data-action="circle">
          <i class="fa-regular fa-circle"></i>
        </button>
        <button class="tool" data-action="text">
          <i class="fa-solid fa-t"></i>
        </button>
        <div class="spacer"></div>
        <button class="tool" data-action="undo">
          <i class="fa-solid fa-arrow-rotate-left"></i>
        </button>
        <button class="tool" data-action="redo">
          <i class="fa-solid fa-arrow-rotate-right"></i>
        </button>
      </div>

      <!-- Main Canvas -->
      <div class="canvas"></div>

      <!-- Floating Sidebar -->
      <div class="sidebar active">
        <button class="btn btn-filled" id="close">
          <i class="fa-solid fa-xmark"></i>
        </button>

        <!-- Dynamic Content -->
        <div class="content">
          <div class="option">
            <label>Fill:</label>
            <input type="checkbox" id="fillToggle" />
          </div>
          <div class="option">
            <label>Outline Color:</label>
            <input type="color" id="outlineColor" />
          </div>
          <div class="option">
            <label>Stroke Width: </label>
            <input type="range" min="1" max="4" step="1" id="slider" />
            <span class="tooltip" id="tooltip">50</span>
          </div>
        </div>
      </div>
    </div>

    <script src="components/toolbar/toolbar.js"></script>
    <script src="components/sidebar/sidebar.js"></script>
  </body>
</html>
